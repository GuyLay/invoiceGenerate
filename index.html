<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>יצירת חשבונית - גננות בעמק</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #eef2ea;
      padding: 30px 20px;
      color: #222;
      min-height: 100vh;
    }

    .page {
      background: white;
      max-width: 860px;
      margin: 0 auto;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    /* ── Top bar ── */
    .top-bar {
      background: #5a8040;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top-bar img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
    }

    .top-bar .title {
      color: white;
      font-size: 22px;
      font-weight: 800;
    }

    .top-bar .subtitle {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      font-weight: 400;
    }

    /* ── Form body ── */
    .form-body {
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Section ── */
    .section-label {
      font-size: 15px;
      font-weight: 700;
      color: #4a7030;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 2px;
      background: #d0e4c0;
      border-radius: 2px;
    }

    /* ── Client name ── */
    .field-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .field-row label {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }

    input[type="text"],
    input[type="number"] {
      border: 1.5px solid #ccddb8;
      border-radius: 7px;
      padding: 9px 12px;
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 14px;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
      background: #fafff7;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #5a8040;
      background: white;
    }

    input[type="number"] { text-align: center; }

    /* ── Materials table ── */
    .materials-table {
      width: 100%;
      border-collapse: collapse;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid #c8ddb8;
    }

    .materials-table thead tr {
      background: #5a8040;
      color: white;
    }

    .materials-table thead th {
      padding: 10px 12px;
      font-size: 13.5px;
      font-weight: 600;
      text-align: right;
    }

    .materials-table thead th.center { text-align: center; }

    .materials-table tbody tr {
      border-bottom: 1px solid #e4eedd;
    }

    .materials-table tbody tr:nth-child(even) {
      background: #f7faf4;
    }

    .materials-table tbody td {
      padding: 7px 8px;
      vertical-align: middle;
    }

    .materials-table tbody td.center { text-align: center; }

    .materials-table tbody td input[type="text"],
    .materials-table tbody td input[type="number"] {
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13.5px;
    }

    .materials-table td.col-remove {
      width: 36px;
      text-align: center;
    }

    /* ── Labor row ── */
    .labor-row {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 12px;
      align-items: center;
      background: #f0f7ea;
      border: 1.5px solid #c8ddb8;
      border-radius: 10px;
      padding: 12px 16px;
    }

    .labor-row label {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      display: block;
      font-weight: 600;
    }

    /* ── Notes / Terms ── */
    .dynamic-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .dynamic-list .list-item {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dynamic-list .list-item input {
      flex: 1;
    }

    /* ── Buttons ── */
    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1.5px dashed #5a8040;
      border-radius: 8px;
      padding: 7px 14px;
      color: #5a8040;
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-add:hover {
      background: #5a8040;
      color: white;
    }

    .btn-add .plus {
      font-size: 18px;
      line-height: 1;
    }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: #cc4444;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-remove:hover { background: #ffeaea; }

    /* ── Generate button ── */
    .btn-generate {
      width: 100%;
      background: #5a8040;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    .btn-generate:hover { background: #4a6f32; }
    .btn-generate:active { transform: scale(0.99); }

    /* col widths in materials table */
    .col-material { min-width: 160px; }
    .col-qty      { width: 80px; }
    .col-unit     { width: 100px; }
    .col-price    { width: 110px; }
    .col-remove   { width: 40px; }

    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { padding: 0; }

      .page { border-radius: 0; box-shadow: none; }

      .top-bar { padding: 14px 18px; gap: 12px; }
      .top-bar img { width: 44px; height: 44px; }
      .top-bar .title { font-size: 18px; }

      .form-body { padding: 18px 14px; gap: 22px; }

      /* prevent iOS auto-zoom on focus */
      input[type="text"],
      input[type="number"] { font-size: 16px; }

      .materials-table thead th,
      .materials-table tbody td input { font-size: 13px; }

      .labor-row { grid-template-columns: 1fr; }

      .field-row { flex-direction: column; align-items: flex-start; }
      .field-row input { max-width: 100% !important; }

      .btn-generate { font-size: 16px; padding: 14px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Top bar -->
  <div class="top-bar">
    <img src="assets/logo.jpeg" alt="לוגו">
    <div>
      <div class="title">גננות בעמק</div>
      <div class="subtitle">יצירת חשבונית חדשה</div>
    </div>
  </div>

  <div class="form-body">

    <!-- Client name -->
    <div>
      <div class="section-label">פרטי לקוח</div>
      <div class="field-row">
        <label for="clientName">שם לקוח:</label>
        <input type="text" id="clientName" placeholder="הכנס שם לקוח" style="max-width:320px">
      </div>
    </div>

    <!-- Materials table -->
    <div>
      <div class="section-label">חומרים</div>
      <div class="table-scroll">
      <table class="materials-table" id="materialsTable">
        <thead>
          <tr>
            <th class="col-material">חומר</th>
            <th class="center col-qty">כמות</th>
            <th class="center col-unit">סוג כמות</th>
            <th class="center col-price">מחיר ליחידה ₪</th>
            <th class="col-remove"></th>
          </tr>
        </thead>
        <tbody id="materialsBody">
          <!-- rows inserted by JS -->
        </tbody>
      </table>
      </div>
      <button class="btn-add" onclick="addMaterialRow()">
        <span class="plus">＋</span> הוסף שורה
      </button>
    </div>

    <!-- Labor cost -->
    <div>
      <div class="section-label">עלות עבודה</div>
      <div class="labor-row">
        <div>
          <label for="laborDesc">תיאור</label>
          <input type="text" id="laborDesc" value="עלות עבודה כללית">
        </div>
        <div>
          <label for="laborPrice">מחיר ₪</label>
          <input type="number" id="laborPrice" placeholder="0" min="0">
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div>
      <div class="section-label">הערות</div>
      <div class="dynamic-list" id="notesList">
        <!-- rows inserted by JS -->
      </div>
      <button class="btn-add" onclick="addNote()">
        <span class="plus">＋</span> הוסף הערה
      </button>
    </div>

    <!-- Terms -->
    <div>
      <div class="section-label">תנאים</div>
      <div class="dynamic-list" id="termsList">
        <!-- rows inserted by JS -->
      </div>
      <button class="btn-add" onclick="addTerm()">
        <span class="plus">＋</span> הוסף תנאי
      </button>
    </div>

    <!-- Generate -->
    <button class="btn-generate" onclick="generateInvoice()">צור חשבונית</button>

  </div>
</div>

<script>
  // ── Materials ──
  function addMaterialRow(material='', qty='', unit='', price='') {
    const tbody = document.getElementById('materialsBody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-material"><input type="text" placeholder="שם החומר" value="${material}"></td>
      <td class="center col-qty"><input type="number" placeholder="0" min="0" value="${qty}"></td>
      <td class="center col-unit"><input type="text" placeholder="יחידות / מטר..." value="${unit}"></td>
      <td class="center col-price"><input type="number" placeholder="0.00" min="0" step="0.01" value="${price}"></td>
      <td class="col-remove"><button class="btn-remove" onclick="removeRow(this)" title="הסר שורה">✕</button></td>
    `;
    tbody.appendChild(tr);
  }

  function removeRow(btn) {
    const tbody = document.getElementById('materialsBody');
    if (tbody.rows.length <= 1) return; // keep at least 1 row
    btn.closest('tr').remove();
  }

  // seed 3 empty rows on load
  addMaterialRow(); addMaterialRow(); addMaterialRow();

  // ── Notes ──
  function addNote(value='') {
    const list = document.getElementById('notesList');
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <input type="text" placeholder="הכנס הערה..." value="${value}">
      <button class="btn-remove" onclick="this.parentElement.remove()" title="הסר">✕</button>
    `;
    list.appendChild(div);
  }

  // ── Terms ──
  function addTerm(value='') {
    const list = document.getElementById('termsList');
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <input type="text" placeholder="הכנס תנאי..." value="${value}">
      <button class="btn-remove" onclick="this.parentElement.remove()" title="הסר">✕</button>
    `;
    list.appendChild(div);
  }

  // seed 1 empty note
  addNote();

  // seed 4 default terms
  const DEFAULT_TERMS = [
    'תוקף הצעת המחיר 14 ימים מהרגע שניתנה.',
    'תשלום מקדמה בסך 50% מהעסקה.',
    'התשלום המלא יוסדר עד שבוע מגמר העבודה.',
    'במידה ויהיו שינויים תוך כדי העבודה יהיו עלויות נוספות.',
  ];
  DEFAULT_TERMS.forEach(t => addTerm(t));

  // ── Generate ──
  function generateInvoice() {
    const clientName = document.getElementById('clientName').value.trim();

    const rows = [...document.querySelectorAll('#materialsBody tr')].map(tr => {
      const inputs = tr.querySelectorAll('input');
      return {
        material: inputs[0].value.trim(),
        qty:      inputs[1].value.trim(),
        unit:     inputs[2].value.trim(),
        price:    parseFloat(inputs[3].value) || 0,
      };
    }).filter(r => r.material);

    const laborDesc  = document.getElementById('laborDesc').value.trim();
    const laborPrice = parseFloat(document.getElementById('laborPrice').value) || 0;

    const notes = [...document.querySelectorAll('#notesList input')]
      .map(i => i.value.trim()).filter(Boolean);

    const terms = [...document.querySelectorAll('#termsList input')]
      .map(i => i.value.trim()).filter(Boolean);

    const data = { clientName, rows, laborDesc, laborPrice, notes, terms };
    sessionStorage.setItem('invoiceData', JSON.stringify(data));
    window.open('invoice.html', '_blank');
  }
</script>
</body>
</html>
