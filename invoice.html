<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הצעת מחיר - גננות בעמק</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #f0f0f0;
      padding: 20px;
      color: #222;
    }

    /* ── Print button (screen only) ── */
    .print-bar {
      max-width: 794px;
      margin: 0 auto 12px auto;
      display: flex;
      justify-content: flex-start;
      gap: 10px;
    }

    .btn-print {
      background: #5a8040;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 22px;
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-back {
      background: white;
      color: #5a8040;
      border: 1.5px solid #5a8040;
      border-radius: 8px;
      padding: 9px 22px;
      font-family: 'Heebo', Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .ios-tip {
      max-width: 794px;
      margin: 0 auto 10px auto;
      background: #fffbe6;
      border: 1px solid #f0d060;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      display: none;
    }

    .ios-tip strong { color: #333; }

    @media print {
      @page {
        size: A4 portrait;
        margin: 0;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .print-bar { display: none !important; }

      body {
        background: white !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      .page {
        width: 210mm !important;
        min-height: 297mm !important;
        margin: 0 !important;
        box-shadow: none !important;
      }
    }

    /* ── Page ── */
    .page {
      background: white;
      width: 794px;
      min-height: 1123px;
      margin: 0 auto;
      padding: 30px 35px 20px 35px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .header-meta {
      font-size: 13px;
      line-height: 1.8;
      color: #333;
      text-align: left;
    }

    .header-meta span {
      font-weight: 600;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header-brand .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 4px;
    }

    .header-brand .company-name {
      font-size: 28px;
      font-weight: 800;
      color: #4a7030;
      letter-spacing: 1px;
    }

    /* ── Main Table ── */
    .table-wrapper {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #c8ddb8;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }

    .invoice-table thead tr {
      background: #5a8040;
      color: white;
    }

    .invoice-table thead th {
      padding: 10px 14px;
      font-weight: 600;
      font-size: 14px;
      text-align: right;
      border: 1px solid #4a7030;
    }

    .invoice-table thead th:nth-child(2),
    .invoice-table thead th:nth-child(3),
    .invoice-table thead th:nth-child(4) {
      text-align: center;
    }

    .invoice-table tbody tr {
      border-bottom: 1px solid #ddd;
    }

    .invoice-table tbody tr:nth-child(even) {
      background: #f7faf4;
    }

    .invoice-table tbody td {
      padding: 9px 14px;
      text-align: right;
      border: 1px solid #e0e0e0;
      vertical-align: middle;
    }

    .invoice-table tbody td:nth-child(2),
    .invoice-table tbody td:nth-child(3),
    .invoice-table tbody td:nth-child(4) {
      text-align: center;
    }

    .invoice-table tbody td:last-child {
      font-weight: 600;
      color: #333;
    }

    .row-subtotal td {
      background: #dce9d0 !important;
      font-weight: 700;
      font-size: 15px;
      color: #2a5010;
    }

    .row-grandtotal td {
      background: #b8d49a !important;
      font-weight: 800;
      font-size: 16px;
      color: #1a3d08;
    }

    .row-spacer td {
      height: 6px;
      background: #f0f0f0 !important;
      border: none;
    }

    .row-labor td {
      background: #f0f7ea !important;
      font-style: italic;
      color: #444;
    }

    /* ── Bottom Section ── */
    .bottom-section {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 20px;
      flex: 1;
    }

    .notes-box {
      flex: 1.3;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 12.5px;
    }

    .notes-box h4 {
      font-size: 14px;
      font-weight: 700;
      color: #5a8040;
      margin-bottom: 8px;
      border-bottom: 2px solid #5a8040;
      padding-bottom: 4px;
    }

    .notes-box p {
      line-height: 1.7;
      color: #444;
      margin-bottom: 4px;
    }

    .terms-box {
      flex: 1;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 14px 16px;
      font-size: 12px;
    }

    .terms-box h4 {
      font-size: 14px;
      font-weight: 700;
      color: #5a8040;
      margin-bottom: 8px;
      border-bottom: 2px solid #5a8040;
      padding-bottom: 4px;
    }

    .terms-box ul {
      list-style: none;
      padding: 0;
    }

    .terms-box ul li {
      padding: 4px 0;
      color: #444;
      line-height: 1.5;
      padding-right: 14px;
      position: relative;
    }

    .terms-box ul li::before {
      content: "•";
      color: #5a8040;
      font-weight: 700;
      position: absolute;
      right: 0;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      background: #5a8040;
      color: white;
      border-radius: 6px;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
    }

    .footer .contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer .contact-item span {
      font-weight: 700;
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <!-- iOS tip (shown only on iOS) -->
  <div class="ios-tip" id="iosTip">
    💡 <strong>שמירה כ-PDF באייפון / אייפד:</strong>
    לחץ על "שתף PDF" ← בחר "שמור בקבצים" ← בחר תיקייה ולחץ שמור.
  </div>

  <!-- Screen-only buttons -->
  <div class="print-bar">
    <a class="btn-back" href="index.html">&#8594; חזור לטופס</a>
    <button class="btn-print" id="btnPrint" onclick="handlePrint()">הדפס / שמור PDF</button>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-brand">
        <img src="assets/logo.jpeg" alt="גננות בעמק" class="logo">
        <div class="company-name">גננות בעמק</div>
      </div>
      <div class="header-meta">
        <div>תאריך: <span id="invoiceDate"></span></div>
        <div>שם לקוח: <span id="invoiceClient"></span></div>
      </div>
    </div>

    <!-- Invoice Table -->
    <div class="table-wrapper">
      <table class="invoice-table">
        <thead>
          <tr>
            <th>חומרים</th>
            <th style="width:14%">כמות</th>
            <th style="width:18%">מחיר</th>
            <th style="width:18%">סה"כ</th>
          </tr>
        </thead>
        <tbody id="invoiceTbody"></tbody>
      </table>
    </div>

    <!-- Bottom: Notes + Terms -->
    <div class="bottom-section">
      <div class="notes-box" id="notesBox">
        <h4>הערות</h4>
        <div id="notesContent"></div>
      </div>
      <div class="terms-box" id="termsBox">
        <h4>תנאים</h4>
        <ul id="termsList"></ul>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="contact-item"><span>מייל –</span> Morlev19373@gmail.com</div>
      <div class="contact-item"><span>מאי –</span> 0527085585</div>
      <div class="contact-item"><span>מור –</span> 0544381584</div>
    </div>

  </div>

<script>
  // ── iOS detection ──
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  if (isIOS) {
    document.getElementById('iosTip').style.display = 'block';
    document.getElementById('btnPrint').textContent = 'שתף PDF';
  }

  function handlePrint() {
    if (isIOS && navigator.share) {
      // Use Web Share API on iOS to trigger native share sheet
      // First trigger print so the page is "ready", then share current URL
      navigator.share({
        title: 'הצעת מחיר - גננות בעמק',
        url: window.location.href
      }).catch(() => window.print());
    } else {
      window.print();
    }
  }

  function fmt(n) {
    return Number(n).toLocaleString('he-IL', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  const data = JSON.parse(sessionStorage.getItem('invoiceData') || '{}');

  // Date
  const today = new Date();
  document.getElementById('invoiceDate').textContent =
    today.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit', year: 'numeric' });

  // Client
  document.getElementById('invoiceClient').textContent = data.clientName || '';

  // Materials rows
  const tbody = document.getElementById('invoiceTbody');
  let materialsTotal = 0;

  (data.rows || []).forEach(row => {
    const rowTotal = (parseFloat(row.qty) || 0) * (parseFloat(row.price) || 0);
    materialsTotal += rowTotal;
    const qtyDisplay = row.unit ? `${row.qty} ${row.unit}` : row.qty;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.material}</td>
      <td>${qtyDisplay}</td>
      <td>₪${fmt(row.price)}</td>
      <td>₪${fmt(rowTotal)}</td>
    `;
    tbody.appendChild(tr);
  });

  // Subtotal
  const subTr = document.createElement('tr');
  subTr.className = 'row-subtotal';
  subTr.innerHTML = `<td colspan="3">סה"כ חומרים</td><td>₪${fmt(materialsTotal)}</td>`;
  tbody.appendChild(subTr);

  // Spacer
  const spacer = document.createElement('tr');
  spacer.className = 'row-spacer';
  spacer.innerHTML = '<td colspan="4"></td>';
  tbody.appendChild(spacer);

  // Labor rows (support both new multi-row format and legacy single-row)
  const laborRows = data.laborRows ||
    [{ desc: data.laborDesc || 'עלות עבודה כללית', price: data.laborPrice || 0 }];
  let laborTotal = 0;

  laborRows.forEach(labor => {
    const lp = parseFloat(labor.price) || 0;
    laborTotal += lp;
    const laborTr = document.createElement('tr');
    laborTr.className = 'row-labor';
    laborTr.innerHTML = `
      <td>${labor.desc || 'עלות עבודה'}</td>
      <td>1</td>
      <td>₪${fmt(lp)}</td>
      <td>₪${fmt(lp)}</td>
    `;
    tbody.appendChild(laborTr);
  });

  // Grand total
  const grandTotal = materialsTotal + laborTotal;
  const grandTr = document.createElement('tr');
  grandTr.className = 'row-grandtotal';
  grandTr.innerHTML = `<td colspan="3">סה"כ חומרים ועבודה</td><td>₪${fmt(grandTotal)}</td>`;
  tbody.appendChild(grandTr);

  // Notes
  const notesContent = document.getElementById('notesContent');
  const notes = (data.notes || []).filter(Boolean);
  if (notes.length) {
    notes.forEach(note => {
      const p = document.createElement('p');
      p.textContent = note;
      notesContent.appendChild(p);
    });
  } else {
    document.getElementById('notesBox').style.display = 'none';
  }

  // Terms
  const termsList = document.getElementById('termsList');
  const terms = (data.terms || []).filter(Boolean);
  if (terms.length) {
    terms.forEach(term => {
      const li = document.createElement('li');
      li.textContent = term;
      termsList.appendChild(li);
    });
  } else {
    document.getElementById('termsBox').style.display = 'none';
  }
</script>
</body>
</html>
